# Core Session Autostart (0% Rice - Standard Raw QuickShell Pipeline)
exec-once = quickshell

# Set the Windows/Super key as the main modifier
$mainMod = SUPER

# Core System Keybinds (No Styling, Just Function)
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, V, togglefloating,
# App Launcher Trigger (Launches stock, un-themed wofi/rofi menu)
bind = $mainMod, R, exec, wofi --show drun || rofi -show drun
