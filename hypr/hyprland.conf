# monitor auto-adaptation
monitor=,preferred,auto,1

# reset stock styling
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# layout rules
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 0
    layout = dwindle
}

# physics animations (spring easing math)
animations {
    enabled = true
    
    bezier = fluidspring, 0.05, 0.9, 0.1, 1.05
    bezier = smoothlinear, 0.4, 0.0, 0.2, 1.0

    animation = windows, 1, 5, fluidspring, slide
    animation = workspaces, 1, 4, fluidspring, slidefade 20%
    animation = fade, 1, 3, smoothlinear
}

dwindle {
    pseudotile = true
    preserve_split = true
}
