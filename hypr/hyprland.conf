# Universal Monitor Detection (0% Rice - Standard Resolution & Refresh Rate)
monitor=,preferred,auto,1
exec-once = waybar
# Core Session Autostart
exec-once = waybar

# Set the Windows/Super key as the main modifier
$mainMod = SUPER

# Core System Keybinds (No Styling, Just Function)
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, V, togglefloating,
# App Launcher Trigger (Launches stock, un-themed wofi/rofi menu)
bind = $mainMod, R, exec, wofi --show drun || rofi -show drun
