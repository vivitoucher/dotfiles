# universal minimalist hyprland core configuration template

# 1. monitor layout configuration
# syntax: monitor=name,resolution,position,scale
monitor=,preferred,auto,1

# 2. auto-start core utility daemons on launch
exec-once = dunst

# 3. input and keyboard layout steering
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # -1.0 to 1.0, 0 means no modification
    touchpad {
        natural_scroll = no
    }
}

# 4. aesthetic minimalism and window boundaries
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
    col.active_border = rgba(ff00ffff) # simple magenta accent line
    col.inactive_border = rgba(222222ff)
    layout = dwindle
    no_border_on_floating = false
}

# 5. complete interface decoration stripping
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    blur {
        enabled = false # keep it lightning fast and low latency
    }
}

# 6. physics-driven fluid animation configurations
animations {
    enabled = true
    # bezier curve acceleration settings
    bezier = fluent, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 4, fluent, slide
    animation = windowsOut, 1, 4, fluent, slide
    animation = border, 1, 10, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, fluent, slide
}

# 7. keybindings layout - mapping your core tools
$mod = SUPER

# system control binds
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, V, togglefloating,
bind = $mod, P, dwindle

# launching your custom layer 3 stack
bind = $mod, RETURN, exec, kitty
bind = $mod, D, exec, fuzzel

# window movement focus controls (vim directions)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# workspace switching binds (1-5)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# move active window to workspaces (1-5)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
