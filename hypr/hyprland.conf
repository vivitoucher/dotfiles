# 🌸 PROJECT "HER" - MASTER HYPRLAND BLUEPRINT CONFIG

# 1. SOURCE THE COLOR MATRIX
source = ~/.config/hypr/colors.conf

# 2. MONITOR SETUP (Generic high-res layout for your future setup)
monitor=,preferred,auto,1

# 3. INPUT CONFIGURATION (Keyboard and Mouse feel)
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

# 4. THE AESTHETIC MATRIX (Borders, Gaps, and Glows)
general {
    gaps_in = 6               # Gaps between windows
    gaps_out = 12             # Gaps between windows and monitor edges
    border_size = 2
    
    # Use our glowing e-girl pink for active borders, lavender for inactive
    col.active_border = $main_pink
    col.inactive_border = $lavender

    layout = dwindle          # Top-tier geometric window splitting
}

# 5. PREMIUM DECORATION (The Neon E-Girl Aura)
decoration {
    rounding = 10             # Beautiful soft rounded corners on windows
    
    # Shadow config for a floating, futuristic holographic depth effect
    drop_shadow = true
    shadow_range = 15
    shadow_render_power = 3
    col.shadow = rgba(ff79c6aa) # Soft glowing pink shadow aura
}

# 6. MATHEMATICAL PHYSICS ENGINE (The Ultra-Smooth Curves)
# This uses Cubic Bezier curves to calculate fluid movement physics
animations {
    enabled = true

    # Curve layout: name, control_point_x1, y1, x2, y2
    # This specific curve creates a sleek, premium, snappy glide effect
    bezier = herCurve, 0.16, 1, 0.3, 1

    # Animation execution strings
    animation = windows, 1, 6, herCurve, slide
    animation = edit, 1, 6, herCurve
    animation = fade, 1, 5, herCurve
    animation = workspaces, 1, 5, herCurve, slidefade 20%
}

# 7. MASTER KEYBINDINGS MATRIX (Tactical Control)
# Anchor Key: $mainMod = WINDOWS KEY (Super)

$mainMod = SUPER

# Core System Controls
bind = $mainMod, Q, killactive,          # Close the focused window (Kill)
bind = $mainMod, M, exit,                # Completely log out of Hyprland
bind = $mainMod, V, togglefloating,     # Toggle a window between floating and tiled
bind = $mainMod, P, pseudo,              # Dwindle layout pseudo-tiling toggle
bind = $mainMod, J, togglesplit,         # Change window split direction (horiz/vert)

# Premium Application Launchers (Our Core Stack)
bind = $mainMod, RETURN, exec, kitty    # Open your Translucent Kitty Terminal (Enter key)
bind = $mainMod, SPACE, exec, rofi -show drun # Open your E-Girl Rofi App Launcher

# Window Focus Navigation (Move your focus between split screens smoothly)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspace Switching Layout (1-6 for clean workspace partitioning)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# Move Active Window to a Specific Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# Fluid Window Resizing/Moving with Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
