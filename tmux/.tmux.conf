# universal low-latency tmux window layout template

# 1. system response times and interface overrides
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:rgb"

# 2. visual layout balancing boundaries
set -g status-keys vi
set -g mode-keys vi
set -g mouse on
set -g status-interval 5

# 3. window indexing parameters
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# 4. layout split mappings that match your editor styles
unbind %
unbind '"'
bind sv split-window -h -c "#{pane_current_path}"
bind sh split-window -v -c "#{pane_current_path}"

# 5. basic status tracking panel (suppressed to a thin line)
set -g status-style "bg=default,fg=white"
set -g status-left ""
set -g status-right "#[fg=magenta]› #[fg=white]%h-%d #[fg=magenta]› #[fg=white]%h:%m "
