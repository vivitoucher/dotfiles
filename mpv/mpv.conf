# universal high-performance mpv media engine layout

# 1. privacy settings - completely disable logging and local history tracking
history-record=no
write-filename-in-watch-later-config=no

# 2. window style and absolute UI minimalism
no-border=yes
autofit=960x540
keep-open=yes

# 3. video playback performance and caching optimizations
vo=gpu
hwdec=auto-safe
cache=yes
demuxer-max-bytes=150mib
demuxer-max-back-bytes=50mib

# 4. language priorities for media tracks
alang=jpn,eng
slang=eng,chs
