# get rid of the newline before the prompt for a compact layout
add_newline = false

# custom command format layout structure
format = """
$directory\
$git_branch\
$git_status\
$character"""

[directory]
style = "bold #a6e3a1"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 🔒"

[character]
success_symbol = "[ 🌸 vt ›](bold #ffffff)"
error_symbol = "[ 🌸 vt ›](bold #f38ba8)"

[git_branch]
symbol = "🌿 "
style = "bold #b4befe"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold #f38ba8"
format = "[[$all_status$ahead_behind]]($style) "
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# completely muzzle unnecessary programming language runtime versions
[aws]
disabled = true
[gcloud]
disabled = true
[line_break]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[rust]
disabled = true
