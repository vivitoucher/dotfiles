# universal low-latency btop configuration template

# 1. basic visual architecture and layout adjustments
color_theme = "default"
theme_background = false
truecolor = true
rounded_corners = true
graph_symbol = "braille"
show_boxes = true

# 2. engine update latency timings (configured for max performance)
update_ms = 500

# 3. system tracking parameter controls
proc_sorting = "cpu"
proc_reversed = false
proc_tree = true
check_temp = true
cpu_invert_hover = true
draw_clock = ""

# 4. foundational storage and safety options
log_level = "warning"

