# 🌸 KITTY TYPOGRAPHY MATRIX
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size        11.5
window_padding_width 15  # Gives the text some soft breathing room away from the edges# 🌸 PROJECT "HER" - KITTY TERMINAL MASTER CONFIG

# 1. FONTS (Clean, modern developer font layout)
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# 2. THE AESTHETIC TRANSPARENCY (The holographic glass effect)
background_opacity 0.82
dynamic_background_opacity yes

# 3. WINDOW LAYOUT (Padding around the text so it doesn't hug the screen edges)
window_padding_width 10

# 4. THE COLOR MATRIX (Matching our master e-girl color system)
background            #101419
foreground            #e1e8f5
cursor                #ff79c6
cursor_text_color     #101419

# Active/Inactive window borders
active_border_color   #ff79c6
inactive_border_color #bd93f9

# 5. TERMINAL COLOR ANSI PALETTE (For terminal programs, scripts, and neofetch)
# Black & Dark Grey
color0 #101419
color8 #4d5668

# Red (System Alerts)
color1 #ff5555
color9 #ff6e6e

# Green/Teal (Neon Glow Accent)
color2  #00f5d4
color10 #50fa7b

# Yellow/Orange
color3  #f1fa8c
color11 #ffb86c

# Blue/Lavender
color4  #bd93f9
color12 #d6b7ff

# Magenta/Pink (Main E-Girl Accent)
color5  #ff79c6
color13 #ff92df

# Cyan
color6  #8be9fd
color14 #a4ffff

# White
color7  #e1e8f5
color15 #ffffff

# 6. PERFORMANCE SETTINGS
repaint_delay   10
input_delay     3
sync_to_monitor yes
